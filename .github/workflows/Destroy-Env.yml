name: Destroy NIH Environment

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Choose environment to destroy
        options: 
        - test
        - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:

    - name: Checkout code
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

    - name: Log into Azure
      uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1.7.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Azure CLI script
      uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.1.0
      with:
        azcliversion: 2.30.0
        inlineScript: |
          chmod +x $GITHUB_WORKSPACE/.github/workflows/scripts/Delete_RGs.sh 
          $GITHUB_WORKSPACE/.github/workflows/scripts/Delete_RGs.sh ${{ github.event.inputs.environment }}
