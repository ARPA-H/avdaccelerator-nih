name: Delete Deployment Stack

on:
    workflow_dispatch:
      inputs:
        environment:
          type: choice
          description: Choose environment to deploy
          options: 
          - Test
          - Prod
        deployment_stack_name: 
          type: string
          description: Name of deployment stack to delete
          default: 'Test-Depl-Statck'

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:

    - name: Checkout code
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

    - name: Log into Azure
      uses: azure/login@cb79c773a3cfa27f31f25eb3f677781210c9ce3d # v1.7.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }} 
        enable-AzPSSession: true
    
    - name: Run Azure PowerShell inline script
      uses: azure/powershell@53dd145408794f7e80f97cfcca04155c85234709 # v2.0.0
      with:
        inlineScript: |
          Remove-AzSubscriptionDeploymentStack -Name ${{ github.event.inputs.deployment_stack_name }} -ActionOnUnmanage "deleteResources" -Force
        azPSVersion: "latest"

